name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== 后端 Lint / 类型检查 / 安全扫描 =====
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run isort check
        run: isort --check-only --diff app/ tests/ pipeline/

      - name: Run ruff check
        run: ruff check app/ tests/ pipeline/

      - name: Run black check
        run: black --check app/ tests/ pipeline/

      - name: Run mypy strict type check
        run: mypy app/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-test-secret-key-min-32-characters-long-aaaa-bbbb
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=html --cov-fail-under=80

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7

  # ===== 后端安全扫描 =====
  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit safety

      - name: Run bandit security linter
        run: bandit -r app/ -c pyproject.toml || bandit -r app/ -ll

      - name: Run safety dependency check
        run: safety check --full-report
        continue-on-error: true

  # ===== 前端 Lint & 类型检查 =====
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ===== 前端构建验证 =====
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (production)
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_SENTRY_DSN: ""
        run: npm run build

  # ===== E2E 测试 =====
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gradpath_test
          POSTGRES_USER: gradpath
          POSTGRES_PASSWORD: gradpath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gradpath"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: |
          DATABASE_URL=postgresql://gradpath:gradpath_test@localhost:5432/gradpath_test \
          ENVIRONMENT=development \
          SECRET_KEY=ci-test-secret-key-min-32-characters-long-aaaa-bbbb \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          npx wait-on http://localhost:8000/health --timeout 30000

      - name: Start frontend
        working-directory: frontend
        run: |
          NEXT_PUBLIC_API_URL=http://localhost:8000 \
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

  # ===== Docker 构建验证 =====
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: gradpath-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: gradpath-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke test backend image
        run: |
          docker run --rm -d --name gradpath-backend-ci \
            -e SECRET_KEY=ci-test-secret-key-min-32-characters-long-aaaa-bbbb \
            -e ENVIRONMENT=development \
            -e DATABASE_URL=sqlite:///:memory: \
            -p 18000:8000 \
            gradpath-backend:ci
          sleep 5
          curl -fsS http://localhost:18000/health | grep -q '"status"'
          docker stop gradpath-backend-ci || true

  # ===== Pre-commit 检查 =====
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files
