# ===================================================================
# 统一高速爬取引擎 — 数据源配置
# ===================================================================
# 每个 source 的字段说明：
#   name          : 数据源中文名称
#   enabled       : 是否启用
#   source_type   : 数据类型 (grad=考研 / civil=公考)
#   list_urls     : 列表页 URL 列表（用于发现详情页 URL）
#   list_parser   : 列表页解析器名称（对应 PARSE_REGISTRY 中的 key）
#   detail_parser : 详情页解析器名称（对应 PARSE_REGISTRY 中的 key）
#   concurrency   : 并发抓取数（Semaphore 信号量）
#   rate_limit    : 请求间隔（秒）
#   target_model  : 入库目标 ORM 模型名
#   unique_key    : 去重字段名
#   category_map  : 源分类 → 数据库 category 字段映射
# ===================================================================

# ── 数据源 1: 研招网 (yz.chsi.com.cn) ──
# URL 生成规则（复用 firecrawl_yz_batch.py 的 SECTIONS 配置）：
#   page 1  → {BASE_URL}{path}
#   page 2+ → {BASE_URL}{path}index_{page}.html
#   kydt  考研动态 (原 max_pages=50, 取前 5 页)
#   jybzc 教育部政策 (原 max_pages=20, 取前 3 页)
#   zsjz  招生简章 (原 max_pages=30, 取前 3 页)
#   fstj  复试经验 (原 max_pages=20, 取前 3 页)
yanzhao:
  name: 研招网
  enabled: true
  source_type: grad
  list_urls:
    - https://yz.chsi.com.cn/kyzx/kydt/
    - https://yz.chsi.com.cn/kyzx/kydt/index_2.html
    - https://yz.chsi.com.cn/kyzx/kydt/index_3.html
    - https://yz.chsi.com.cn/kyzx/kydt/index_4.html
    - https://yz.chsi.com.cn/kyzx/kydt/index_5.html
    - https://yz.chsi.com.cn/kyzx/jybzc/
    - https://yz.chsi.com.cn/kyzx/jybzc/index_2.html
    - https://yz.chsi.com.cn/kyzx/jybzc/index_3.html
    - https://yz.chsi.com.cn/kyzx/zsjz/
    - https://yz.chsi.com.cn/kyzx/zsjz/index_2.html
    - https://yz.chsi.com.cn/kyzx/zsjz/index_3.html
    - https://yz.chsi.com.cn/kyzx/fstj/
    - https://yz.chsi.com.cn/kyzx/fstj/index_2.html
    - https://yz.chsi.com.cn/kyzx/fstj/index_3.html
  list_parser: yz_list
  detail_parser: yz_detail
  concurrency: 10
  rate_limit: 0.5
  target_model: ExperiencePost
  unique_key: source_url
  category_map:
    kydt: 政策
    jybzc: 政策
    zsjz: 政策
    fstj: 复试

# ── 数据源 2: 考研帮 (kaoyan.com) ──
# 列表页 URL 复用 batch_scrape_all.py 的 crawl_kaoyan() 列表页
kaoyan:
  name: 考研帮
  enabled: true
  source_type: grad
  list_urls:
    - https://www.kaoyan.com/experience/?page=1
    - https://www.kaoyan.com/experience/?page=2
    - https://www.kaoyan.com/experience/?page=3
    - https://www.kaoyan.com/experience/?page=4
    - https://www.kaoyan.com/experience/?page=5
    - https://www.kaoyan.com/news/list/1/9370
    - https://www.kaoyan.com/news/list/1/3946
    - https://www.kaoyan.com/news/list/1/3949
  list_parser: kaoyan_list
  detail_parser: kaoyan_detail
  concurrency: 15
  rate_limit: 0.3
  target_model: ExperiencePost
  unique_key: source_url
  category_map:
    初试: 初试
    复试: 复试
    调剂: 调剂
    择校: 择校
    备考: 复习
    政策: general
    分数线: 初试
    专业分析: general
    经验分享: general
    院校信息: 择校

