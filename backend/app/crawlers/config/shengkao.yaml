# 省考职位表爬虫配置
name: shengkao
category: civil
description: 省考职位表爬虫
enabled: true
schedule: yearly  # 省考每年一次
rate_limit: 1.0
rate_limit_ms: 1000
max_retries: 3
timeout_seconds: 30
target_table: civil_service_post_intel
dedup_key:
  - region
  - department
  - post_name
notes: |
  数据源：各省人事考试网公开职位表整理的预置数据。
  覆盖范围：15 个省份的省直机关与地市级机关，共 200 条省考职位记录。
  抓取策略：因各省职位表格式不一、难以统一抓取，使用预置数据，
  包含职位代码、招录人数、报名人数、报录比、学历/专业/政治面貌/年龄/工作年限要求、
  笔试科目、薪资估计等关键字段。
  去重规则：按 region + department + post_name + user_id(system) 去重，已存在则跳过。
