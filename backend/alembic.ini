# Alembic migration configuration
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = migrations

# Template for migration file names
# file_template = %%(rev)s_%%(slug)s

# Database URL placeholder; env.py overrides from app.config.settings
sqlalchemy.url = sqlite:///./gradpath.db

# Timezone
timezone = UTC

# Migration file naming template
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long slugs
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# hooks = black ruff isort

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
